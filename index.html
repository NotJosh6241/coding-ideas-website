<!DOCTYPE html>
<html>
<head>
    <title>CodeVault - Coding Ideas</title>

    <style>
        body {
            margin: 0;
            font-family: Arial;
            background: #0f172a;
            color: white;
        }

        header {
            position: sticky;
            top: 0;
            display: flex;
            justify-content: space-between;
            padding: 15px;
            background: rgba(15,23,42,0.9);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid #1e293b;
        }

        .hero {
            text-align: center;
            padding: 40px 20px 10px;
        }

        .hero h1 {
            font-size: 32px;
        }

        .controls {
            display: flex;
            gap: 10px;
            justify-content: center;
            flex-wrap: wrap;
            padding: 10px;
        }

        input, select {
            padding: 10px;
            border-radius: 8px;
            border: none;
        }

        .container {
            max-width: 1100px;
            margin: auto;
            padding: 20px;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 15px;
        }

        .card {
            background: #1e293b;
            padding: 15px;
            border-radius: 12px;
            transition: 0.2s;
        }

        .card:hover {
            transform: translateY(-5px);
        }

        .meta {
            font-size: 12px;
            color: #94a3b8;
        }

        .actions {
            display: flex;
            justify-content: space-between;
            margin-top: 10px;
        }

        .small-btn {
            font-size: 12px;
            padding: 6px 10px;
            border-radius: 6px;
            border: none;
            cursor: pointer;
        }
    </style>
</head>

<body>

<header>
    <div>🚀 CodeVault</div>
    <div>
        <button class="small-btn" onclick="toggleSaved()">Saved Ideas</button>
        <button class="small-btn" onclick="randomIdea()">Random Idea</button>
    </div>
</header>

<div class="hero">
    <h1>Your Coding Idea Engine</h1>
    <p>Turn ideas into real projects</p>
</div>

<div class="controls">
    <input id="search" placeholder="Search ideas...">

    <select id="filterLang">
        <option value="all">All Languages</option>
        <option value="JavaScript">JavaScript</option>
        <option value="Python">Python</option>
        <option value="HTML">HTML/CSS</option>
    </select>

    <select id="filterDiff">
        <option value="all">All Difficulty</option>
        <option value="easy">Easy</option>
        <option value="mid">Medium</option>
        <option value="hard">Hard</option>
    </select>
</div>

<div class="container">
    <div class="grid" id="grid"></div>
</div>

<script>

/* =========================
   MASSIVE IDEA DATABASE
========================= */

const ideas = [
    // EASY
    {name:"Calculator", lang:"JavaScript", diff:2},
    {name:"To-Do List App", lang:"JavaScript", diff:2},
    {name:"Number Guessing Game", lang:"JavaScript", diff:2},
    {name:"Random Joke Generator", lang:"Python", diff:2},
    {name:"CLI Calculator", lang:"Python", diff:2},
    {name:"Unit Converter", lang:"JavaScript", diff:3},
    {name:"Digital Clock", lang:"JavaScript", diff:3},
    {name:"Password Generator", lang:"JavaScript", diff:3},
    {name:"Quiz Game", lang:"JavaScript", diff:3},
    {name:"Temperature Converter", lang:"Python", diff:3},

    // MEDIUM
    {name:"Weather App API", lang:"JavaScript", diff:5},
    {name:"Notes App", lang:"JavaScript", diff:5},
    {name:"Expense Tracker", lang:"JavaScript", diff:6},
    {name:"Music Player UI", lang:"JavaScript", diff:5},
    {name:"Blog Website", lang:"HTML", diff:4},
    {name:"Portfolio Website", lang:"HTML", diff:3},
    {name:"Bank System CLI", lang:"Python", diff:4},
    {name:"Text Adventure Game", lang:"Python", diff:5},
    {name:"File Organizer", lang:"Python", diff:5},
    {name:"Chatbot (Basic)", lang:"Python", diff:6},
    {name:"Login Form Validator", lang:"JavaScript", diff:5},
    {name:"Image Gallery", lang:"JavaScript", diff:4},
    {name:"Drag & Drop Todo", lang:"JavaScript", diff:6},
    {name:"Sorting Visualiser", lang:"JavaScript", diff:6},

    // HARD
    {name:"Real-Time Chat UI", lang:"JavaScript", diff:7},
    {name:"AI Chat Interface Mock", lang:"JavaScript", diff:8},
    {name:"SaaS Dashboard UI", lang:"JavaScript", diff:8},
    {name:"Task Manager System", lang:"JavaScript", diff:7},
    {name:"Social Feed Clone", lang:"JavaScript", diff:7},
    {name:"Game Engine Prototype", lang:"JavaScript", diff:9},
    {name:"ML Predictor", lang:"Python", diff:8},
    {name:"AI Image Classifier", lang:"Python", diff:9},
    {name:"Stock Tracker", lang:"Python", diff:7},
    {name:"Automation Bot", lang:"Python", diff:8},
    {name:"E-commerce UI Clone", lang:"HTML", diff:7},
    {name:"Markdown Editor", lang:"JavaScript", diff:6},
    {name:"CLI File Explorer", lang:"Python", diff:6},
    {name:"System Monitor Tool", lang:"Python", diff:7},
];

let saved = JSON.parse(localStorage.getItem("saved")) || [];
let showingSaved = false;

/* =========================
   RENDER FUNCTION
========================= */

function render() {
    const grid = document.getElementById("grid");
    grid.innerHTML = "";

    let search = document.getElementById("search").value.toLowerCase();
    let lang = document.getElementById("filterLang").value;
    let diff = document.getElementById("filterDiff").value;

    let list = showingSaved ? ideas.filter(i => saved.includes(i.name)) : ideas;

    list
        .filter(i => i.name.toLowerCase().includes(search))
        .filter(i => lang === "all" || i.lang === lang)
        .filter(i => {
            if(diff === "all") return true;
            if(diff === "easy") return i.diff <= 3;
            if(diff === "mid") return i.diff <= 6;
            if(diff === "hard") return i.diff >= 7;
        })
        .forEach(i => {

            const isSaved = saved.includes(i.name);

            let card = document.createElement("div");
            card.className = "card";

            card.innerHTML = `
                <h3>${i.name}</h3>
                <p class="meta">${i.lang} • Difficulty ${i.diff}/10</p>

                <div class="actions">
                    <button class="small-btn"
                        onclick="saveIdea('${i.name}')"
                        style="
                            background: ${isSaved ? '#334155' : 'gold'};
                            color: ${isSaved ? '#94a3b8' : 'black'};
                            opacity: ${isSaved ? '0.7' : '1'};
                        ">
                        ${isSaved ? '✓ Saved' : '★ Save'}
                    </button>
                </div>
            `;

            grid.appendChild(card);
        });
}

/* =========================
   SAVE SYSTEM
========================= */

function saveIdea(name) {
    if (!saved.includes(name)) {
        saved.push(name);
    } else {
        saved = saved.filter(s => s !== name);
    }

    localStorage.setItem("saved", JSON.stringify(saved));
    render();
}

/* =========================
   EXTRA FEATURES
========================= */

function toggleSaved() {
    showingSaved = !showingSaved;
    render();
}

function randomIdea() {
    const i = ideas[Math.floor(Math.random() * ideas.length)];
    alert("Try building: " + i.name);
}

/* =========================
   EVENTS
========================= */

document.querySelectorAll("input, select").forEach(el =>
    el.addEventListener("input", render)
);

render();

</script>

</body>
</html>
